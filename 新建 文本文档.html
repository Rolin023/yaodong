<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>窑洞分布地图</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      width: 100vw;
      height: 100vh;
    }

    .page {
      width: 100vw;
      height: 100vh;
      background: #fff;
    }

    .map-card {
      width: 100vw;
      height: 100vh;
      background: #fff;
    }

    .map-box {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #fff;
      overflow: hidden;
    }

    /* 缩放层：让地图和图标一起缩放 */
    .map-zoom-layer {
      position: absolute;
      inset: 0;
      transform: scale(1);
      transform-origin: center center;
      will-change: transform;
      transition: transform 0.08s ease-out;
    }

    .map-box img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      user-select: none;
      pointer-events: none;
      background: #fff;
    }

    /* 地图图标 */
    .marker {
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      width: 46px;
      height: 46px;
      border: none;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 5;
      padding: 0;
      opacity: 0.6;
      transition: opacity 0.25s ease, filter 0.25s ease;
    }

    .map-zoom-layer:hover .marker {
      opacity: 0.6;
    }

    .map-zoom-layer .marker:hover,
    .map-zoom-layer .marker:focus-visible {
      opacity: 1;
      z-index: 30;
      filter: drop-shadow(0 0 10px rgba(255, 220, 130, 0.75));
    }

    .marker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 38px;
      border: 2px solid rgba(255, 232, 170, 0.85);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.8s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0.9;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
      }
    }

    .pin {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #b96a32, #6d3517);
      border: 2px solid #fff2c6;
      border-radius: 50% 50% 50% 0;
      transform: translate(-50%, -50%) rotate(-45deg);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45);
      transition: 0.25s;
      z-index: 2;
    }

    .pin::before {
      content: "";
      position: absolute;
      inset: 7px;
      background: #ffe7a3;
      border-radius: 50%;
    }

    .pin span {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(45deg);
      color: #5a2b12;
      font-weight: 900;
      font-size: 13px;
      z-index: 2;
    }

    .marker:hover .pin {
      transform: translate(-50%, -50%) rotate(-45deg) scale(1.15);
      box-shadow: 0 10px 24px rgba(255, 196, 95, 0.45);
    }

    .marker:focus-visible {
      outline: none;
    }

    .marker:focus-visible .pin {
      box-shadow: 0 0 0 4px rgba(255, 232, 170, 0.5);
    }

    .tip {
      position: absolute;
      left: 50%;
      bottom: 48px;
      transform: translateX(-50%) translateY(6px);
      white-space: nowrap;
      background: rgba(37, 22, 10, 0.92);
      color: #ffe8b0;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    }

    .marker:hover .tip,
    .marker:focus-visible .tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .legend {
      position: absolute;
      left: 22px;
      bottom: 22px;
      color: #ffe8b0;
      background: rgba(30, 18, 8, 0.72);
      border: 1px solid rgba(255, 232, 170, 0.25);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(6px);
      z-index: 70;
    }

    .legend span {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #a95f2f;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }

    /* 弹窗 */
    dialog {
      position: relative;
      width: min(620px, calc(100vw - 32px));
      max-height: calc(100vh - 36px);
      overflow-y: auto;
      border: none;
      border-radius: 22px;
      padding: 30px 32px 28px;
      background: linear-gradient(180deg, #fff8e8, #f5dfbd);
      color: #2b1a0e;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(4px);
    }

    .close-btn {
      position: absolute;
      right: 16px;
      top: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(96, 50, 21, 0.12);
      color: #5b2c13;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      z-index: 10;
    }

    .close-btn:hover {
      background: rgba(96, 50, 21, 0.22);
    }

    .dialog-meta {
      margin: 0 0 8px;
      color: #a45b24;
      font-weight: 700;
      font-size: 14px;
      padding-right: 36px;
    }

    .dialog-title {
      margin: 0 0 14px;
      font-size: 26px;
      color: #3b210f;
      padding-right: 36px;
    }

    /* 弹窗图片 */
    .dialog-image-wrap {
      width: 100%;
      margin: 0 0 16px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(80, 45, 20, 0.12);
      box-shadow: 0 10px 24px rgba(72, 39, 14, 0.18);
    }

    .dialog-image {
      width: 100%;
      height: 260px;
      display: block;
      object-fit: cover;
      user-select: none;
    }

    .dialog-intro {
      margin: 0 0 16px;
      line-height: 1.8;
      font-size: 16px;
    }

    .dialog-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
      font-size: 15px;
    }

    .dialog-list li::marker {
      color: #a95f2f;
    }

    @media (max-width: 768px) {
      .marker {
        width: 38px;
        height: 38px;
      }

      .pin {
        width: 28px;
        height: 28px;
      }

      .pin span {
        font-size: 11px;
      }

      .tip {
        display: none;
      }

      .legend {
        left: 10px;
        bottom: 10px;
        max-width: calc(100vw - 20px);
        font-size: 12px;
        padding: 7px 10px;
      }

      dialog {
        padding: 28px 22px 24px;
      }

      .dialog-title {
        font-size: 22px;
      }

      .dialog-image {
        height: 190px;
      }

      .dialog-intro,
      .dialog-list {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <section class="map-card">
      <main class="map-box" id="mapBox">

        <!-- 地图和图标都放进缩放层里 -->
        <div class="map-zoom-layer" id="mapZoomLayer">

          <!-- 把你的地图图片命名为 map.png，放到当前 HTML 文件同目录 -->
          <img src="./map.png" alt="中国窑洞分布地图" />

          <!-- 河北省代表：张家口阳原窑洞 -->
          <button class="marker" style="--x: 58.8; --y: 30.8;" data-site="hebei" aria-label="查看河北张家口阳原窑洞介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">河北阳原</span>
          </button>

          <!-- 河南省代表：三门峡陕州地坑院 -->
          <button class="marker" style="--x: 56; --y: 41;" data-site="henan" aria-label="查看河南三门峡陕州地坑院介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">河南陕州</span>
          </button>

          <!-- 山西省代表：吕梁临县李家山窑洞 -->
          <button class="marker" style="--x: 55.8; --y: 36.0;" data-site="shanxi" aria-label="查看山西吕梁临县李家山窑洞介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">山西李家山</span>
          </button>

          <!-- 陕西省代表：延安杨家岭窑洞 -->
          <button class="marker" style="--x: 54.6; --y: 38.4;" data-site="shaanxi" aria-label="查看陕西延安杨家岭窑洞介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">陕西延安</span>
          </button>

          <!-- 甘肃省代表：庆阳董志塬窑洞 -->
          <button class="marker" style="--x: 53; --y: 38.3;" data-site="gansu" aria-label="查看甘肃庆阳董志塬窑洞介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">甘肃庆阳</span>
          </button>

          <!-- 宁夏回族自治区代表：固原西吉窑洞 -->
          <button class="marker" style="--x: 51.3; --y: 38.5;" data-site="ningxia" aria-label="查看宁夏固原西吉窑洞介绍">
            <span class="pin"><span>窑</span></span>
            <span class="tip">宁夏西吉</span>
          </button>

        </div>

        <div class="legend">
          <span></span>滚轮缩放地图，悬停显示图标，点击查看介绍
        </div>

      </main>
    </section>
  </div>

  <dialog id="infoDialog">
    <button class="close-btn" id="closeDialog" aria-label="关闭">×</button>
    <p class="dialog-meta" id="dialogMeta"></p>
    <h2 class="dialog-title" id="dialogTitle"></h2>

    <!-- 对应地点图片会显示在这里 -->
    <div class="dialog-image-wrap" id="dialogImageWrap">
      <img class="dialog-image" id="dialogImage" src="" alt="" />
    </div>

    <p class="dialog-intro" id="dialogIntro"></p>
    <ul class="dialog-list" id="dialogList"></ul>
  </dialog>

  <script>
    const siteInfo = {
      hebei: {
        meta: "河北省｜张家口阳原窑洞",
        title: "河北张家口阳原窑洞",
        image: "./images/河北张家口.jpg",
        intro:
          "河北省的窑洞主要分布在冀西北黄土丘陵区和太行山沿线局部地区，其中张家口阳原一带可作为河北窑洞民居的代表。这里地处黄土丘陵与山地过渡地带，传统民居常依山坡、沟崖修建。",
        points: [
          "代表地点：河北省张家口市阳原县一带。",
          "主要类型包括靠崖式窑洞、半窑洞式民居和砖石结合窑居。",
          "建筑多顺应山坡和沟谷地形，具有防风、保温、节省建材等特点。",
          "体现了冀西北居民利用黄土地貌和山地环境建造居所的生活智慧。"
        ]
      },

      henan: {
        meta: "河南省｜三门峡陕州地坑院",
        title: "河南三门峡陕州地坑院",
        image: "./images/河南陕州.png",
        intro:
          "河南省最具代表性的窑洞形式是三门峡陕州地坑院。它是在平坦黄土地面向下挖出院落，再在院落四壁开凿窑洞，形成独特的地下院落式民居，也被称为“地下四合院”。",
        points: [
          "代表地点：河南省三门峡市陕州区。",
          "典型形式为地坑院、天井窑院和地下四合院式窑居。",
          "具有“见树不见村，进村不见房”的独特景观。",
          "院落下沉，能够避风、防寒、隔热，体现了豫西黄土塬区的建筑智慧。"
        ]
      },

      shanxi: {
        meta: "山西省｜吕梁临县李家山窑洞",
        title: "山西吕梁临县李家山窑洞",
        image: "./images/山西吕梁.png",
        intro:
          "山西省窑洞分布广泛，其中吕梁临县李家山村的窑洞民居较有代表性。这里的窑洞依山而建，层层叠叠，与黄土坡地、院落空间结合紧密，具有浓厚的晋西黄土高原民居特色。",
        points: [
          "代表地点：山西省吕梁市临县李家山村。",
          "常见类型包括靠崖式窑洞、土窑、砖券窑和窑洞院落。",
          "窑洞沿山势分布，形成层次丰富的山地聚落景观。",
          "体现了山西黄土建筑与晋地院落文化相结合的特点。"
        ]
      },

      shaanxi: {
        meta: "陕西省｜延安杨家岭窑洞",
        title: "陕西延安杨家岭窑洞",
        image: "./images/陕西延安.png",
        intro:
          "陕西窑洞以陕北地区最具代表性，延安杨家岭窑洞是其中的重要代表。陕北黄土层深厚，窑洞多依山而建，拱形门窗和厚实土壁使其具有冬暖夏凉的特点。",
        points: [
          "代表地点：陕西省延安市杨家岭一带。",
          "主要类型有靠崖式窑洞、窑洞院落、土窑洞和砖面窑洞。",
          "窑洞利用黄土天然稳定性建造，节省木材和砖石。",
          "延安窑洞不仅是传统民居，也承载着重要的红色文化记忆。"
        ]
      },

      gansu: {
        meta: "甘肃省｜庆阳董志塬窑洞",
        title: "甘肃庆阳董志塬窑洞",
        image: "./images/甘肃庆阳.jpg",
        intro:
          "甘肃省窑洞主要分布在陇东黄土高原地区，庆阳董志塬一带可作为代表。这里黄土层深厚，塬、梁、峁、沟地貌明显，传统窑洞多依塬边、沟坡或山崖开凿。",
        points: [
          "代表地点：甘肃省庆阳市董志塬一带。",
          "常见类型包括靠崖式窑洞、沟崖窑洞和院落式窑居。",
          "适应陇东地区干旱少雨、昼夜温差较大的自然环境。",
          "体现了当地居民就地取材、顺应黄土地貌的传统居住方式。"
        ]
      },

      ningxia: {
        meta: "宁夏｜固原西吉窑洞",
        title: "宁夏固原西吉窑洞",
        image: "./images/宁夏固原.jpg",
        intro:
          "宁夏窑洞主要分布在宁夏南部黄土丘陵区，其中固原西吉一带较具代表性。当地窑洞多依山坡或沟谷开凿，具有较好的保温、防风效果，是黄土高原窑居文化向西北地区延伸的重要体现。",
        points: [
          "代表地点：宁夏回族自治区固原市西吉县一带。",
          "常见类型包括靠崖式窑洞、半地穴式窑洞、土窑和砖箍窑。",
          "窑洞适合当地干燥、寒冷、风沙较大的自然环境。",
          "反映了宁南山区居民利用黄土丘陵地貌建造居所的生活智慧。"
        ]
      }
    };

    const dialog = document.getElementById("infoDialog");
    const dialogMeta = document.getElementById("dialogMeta");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogImageWrap = document.getElementById("dialogImageWrap");
    const dialogImage = document.getElementById("dialogImage");
    const dialogIntro = document.getElementById("dialogIntro");
    const dialogList = document.getElementById("dialogList");
    const closeDialog = document.getElementById("closeDialog");

    const mapZoomLayer = document.getElementById("mapZoomLayer");

    let mapScale = 1;
    const minScale = 1;
    const maxScale = 5;
    const zoomStep = 1.15;

    function updateMapZoom() {
      mapZoomLayer.style.transform = `scale(${mapScale})`;
    }

    /* 滚轮缩放功能 */
    mapZoomLayer.addEventListener(
      "wheel",
      event => {
        if (dialog.open) return;

        event.preventDefault();

        if (event.deltaY < 0) {
          mapScale = Math.min(maxScale, mapScale * zoomStep);
        } else {
          mapScale = Math.max(minScale, mapScale / zoomStep);
        }

        if (Math.abs(mapScale - 1) < 0.01) {
          mapScale = 1;
        }

        updateMapZoom();
      },
      { passive: false }
    );

    /* 图片加载失败时隐藏图片区域，避免出现破图 */
    dialogImage.addEventListener("error", () => {
      dialogImageWrap.style.display = "none";
    });

    dialogImage.addEventListener("load", () => {
      dialogImageWrap.style.display = "block";
    });

    /* 点击图标弹出介绍 */
    document.querySelectorAll(".marker").forEach(marker => {
      marker.addEventListener("click", () => {
        const key = marker.dataset.site;
        const info = siteInfo[key];

        dialogMeta.textContent = info.meta;
        dialogTitle.textContent = info.title;

        dialogImageWrap.style.display = "block";
        dialogImage.src = info.image;
        dialogImage.alt = info.title;

        dialogIntro.textContent = info.intro;
        dialogList.innerHTML = info.points.map(item => `<li>${item}</li>`).join("");

        dialog.showModal();
      });
    });

    closeDialog.addEventListener("click", () => {
      dialog.close();
    });

    dialog.addEventListener("click", event => {
      if (event.target === dialog) {
        dialog.close();
      }
    });
  </script>
</body>
</html>
